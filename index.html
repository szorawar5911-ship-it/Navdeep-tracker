<!DOCTYPE html>
<html>
<head>
  <title>Navdeep Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:#fff; }
    .box { background:#222; padding:15px; border-radius:8px; margin:10px 0; }
  </style>
</head>
<body>
  <h2>Visitor Details</h2>
  <div class="box" id="datetime">Loading time...</div>
  <div class="box" id="location">Loading location...</div>

<script>
  // Show current date & time
  function updateTime() {
    document.getElementById('datetime').innerHTML = 
      "<b>Date & Time:</b><br>" + new Date().toString();
  }
  updateTime();
  setInterval(updateTime, 1000);

  // Get location by IP (city/country)
  fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
      document.getElementById('location').innerHTML = 
        "<b>Location (by IP):</b><br>" +
        "City: " + data.city + "<br>" +
        "Region: " + data.region + "<br>" +
        "Country: " + data.country_name + "<br>" +
        "IP: " + data.ip;
    })
    .catch(err => {
      document.getElementById('location').innerHTML = "Location not available";
    });
</script>
</body>
</html>
